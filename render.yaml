version: "1"
projects:
- name: AG-UI Dojo
  environments:
  - name: Production
    services:
    - type: web
      name: ag-ui-dojo-langgraph-fastapi
      runtime: python
      repo: https://github.com/ag-ui-protocol/ag-ui
      plan: starter
      envVars:
      - key: PYTHON_VERSION
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      region: virginia
      buildCommand: uv sync
      startCommand: uv run agents/dojo.py
