          type: web
          property: host
      - key: A2A_MIDDLEWARE_IT_URL
        fromService:
          name: ag-ui-dojo-a2a-middleware-it
          type: web
          property: host
      - key: A2A_MIDDLEWARE_ORCHESTRATOR_URL
        fromService:
          name: ag-ui-dojo-a2a-middleware-orchestrator
          type: web
          property: host
      - key: AWS_STRANDS_URL
        fromService:
          name: ag-ui-dojo-strands-python
          type: web
          property: host
      - key: CLAUDE_AGENT_SDK_PYTHON_URL
