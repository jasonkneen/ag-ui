name: Release TypeScript Packages

on:
  push:
    branches: [main]
    paths:
      - "sdks/typescript/**"
      - "middlewares/**"
      - "integrations/*/typescript/**"
      - "integrations/community/*/typescript/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/release-typescript.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing (build + detect only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-typescript
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Detect version changes
        id: detect
        run: |
          CHANGED=$(bash scripts/release/detect-ts-version-changes.sh 2>detect-ts.log)
          cat detect-ts.log
          [ "$CHANGED" = "null" ] && CHANGED="[]"
          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$CHANGED" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "## TypeScript packages to publish" >> $GITHUB_STEP_SUMMARY
            echo "$CHANGED" | jq -r '.[] | "- \(.name)@\(.version)"' >> $GITHUB_STEP_SUMMARY
          else
            echo "## No TypeScript version changes detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish to npm
        if: steps.detect.outputs.count != '0' && (github.event.inputs.dry_run != 'true')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGES: ${{ steps.detect.outputs.packages }}
        run: |
          FAILED=0
          while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            PKG_PATH=$(echo "$pkg" | jq -r '.path')

            echo "Publishing $NAME@$VERSION from $PKG_PATH..."

            if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)'; then
              TAG=$(echo "$VERSION" | grep -oE '(alpha|beta|rc)')
              if ! (cd "$PKG_PATH" && pnpm publish --no-git-checks --access public --tag "$TAG"); then
                echo "ERROR: Failed to publish $NAME@$VERSION" >&2
                FAILED=1
              else
                echo "Published $NAME@$VERSION" >> $GITHUB_STEP_SUMMARY
              fi
            else
              if ! (cd "$PKG_PATH" && pnpm publish --no-git-checks --access public); then
                echo "ERROR: Failed to publish $NAME@$VERSION" >&2
                FAILED=1
              else
                echo "Published $NAME@$VERSION" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done < <(echo "$PACKAGES" | jq -c '.[]')
          if [ "$FAILED" -ne 0 ]; then
            echo "ERROR: One or more packages failed to publish" >&2
            exit 1
          fi

      - name: Create git tags
        if: steps.detect.outputs.count != '0' && (github.event.inputs.dry_run != 'true')
        env:
          PACKAGES: ${{ steps.detect.outputs.packages }}
        run: |
          TAGS=()
          while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="${NAME}@${VERSION}"
            git tag "$TAG" || { echo "ERROR: Failed to tag $TAG" >&2; exit 1; }
            TAGS+=("$TAG")
            echo "Tagged $TAG"
          done < <(echo "$PACKAGES" | jq -c '.[]')
          for t in "${TAGS[@]}"; do
            git push origin "$t"
          done

      - name: Create GitHub Release
        if: steps.detect.outputs.count != '0' && (github.event.inputs.dry_run != 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.detect.outputs.packages }}
        run: |
          bash scripts/release/create-or-update-release.sh typescript "$PACKAGES"

      - name: Dry-run summary
        if: steps.detect.outputs.count != '0' && (github.event.inputs.dry_run == 'true')
        env:
          DRY_RUN: "true"
          PACKAGES: ${{ steps.detect.outputs.packages }}
        run: |
          echo "## Dry Run — would publish:" >> $GITHUB_STEP_SUMMARY
          echo "$PACKAGES" | jq -r '.[] | "- \(.name)@\(.version)"' >> $GITHUB_STEP_SUMMARY
          DRY_RUN=true bash scripts/release/create-or-update-release.sh typescript "$PACKAGES"
