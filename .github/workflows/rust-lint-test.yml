name: test

on:
  push:
    branches: [ "main" ]
    paths:
      - "sdks/community/rust/crates/**"
      - "sdks/community/rust/**/tests/**"
      - "sdks/community/rust/Cargo.toml"
      - "sdks/community/rust/.cargo/**"
      - ".github/workflows/rust-lint-test.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "sdks/community/rust/crates/**"
      - "sdks/community/rust/**/tests/**"
      - "sdks/community/rust/Cargo.toml"
      - "sdks/community/rust/.cargo/**"
      - ".github/workflows/rust-lint-test.yml"

defaults:
  run:
    working-directory: ./sdks/community/rust

permissions:
  contents: read

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    name: Rust SDK Tests [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}

    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Built-in cache is fork-safe (fork PRs can't write to base repo cache)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build
        run: cargo build --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check clippy
        run: cargo clippy -- -D warnings

      - name: Publish ag-ui-core dry-run
        run: cargo publish -p ag-ui-core --dry-run

      - name: Publish ag-ui-client dry-run
        # Documented interim: packaging-only (--no-verify skips the compile-verify).
        # cargo publish drops the workspace [patch.crates-io] override and would
        # compile against the stale ag-ui-core 0.1.0 on crates.io. Drop --no-verify
        # once ag-ui-core is republished to crates.io.
        run: cargo publish -p ag-ui-client --dry-run --no-verify

      - name: Run tests
        run: cargo test --verbose
