name: Release

# Publish to Maven Central when a GitHub release is published, or manually via
# workflow_dispatch — optionally as a dry-run that builds and signs the release
# artifacts without uploading.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (build and sign without uploading)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Test and publish to Maven Central
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdks/community/java/ag-ui

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # Configures ~/.m2/settings.xml with a "central" server whose
          # credentials are read from the env vars below.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          # Imports the signing key used by the maven-gpg-plugin.
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Run tests
        run: mvn -B verify

      # Dry-run: build the release artifacts (sources, javadoc) and GPG-sign them
      # via the release profile, stopping at `verify` so nothing is uploaded.
      - name: Publish to Maven Central (dry-run)
        if: inputs.dry_run == true
        run: |
          echo "🔍 Dry-run: building and signing release artifacts without uploading..."
          mvn -B -Prelease verify -DskipTests
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        if: inputs.dry_run != true
        run: |
          echo "🚀 Publishing to Maven Central..."
          mvn -B -Prelease deploy -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Dry-run summary
        if: success() && inputs.dry_run == true
        run: |
          echo "## ✅ Dry-run complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release artifacts were built and GPG-signed; nothing was uploaded." >> "$GITHUB_STEP_SUMMARY"
          echo "Re-run without the dry-run flag to publish to Maven Central." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish summary
        if: success() && inputs.dry_run != true
        run: |
          echo "## ✅ Published to Maven Central" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check deployment status: https://central.sonatype.com/publishing" >> "$GITHUB_STEP_SUMMARY"
