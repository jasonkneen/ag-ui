name: Release

# Publish to Maven Central whenever a GitHub release is published.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Test and publish to Maven Central
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdks/community/java/ag-ui

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # Configures ~/.m2/settings.xml with a "central" server whose
          # credentials are read from the env vars below.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          # Imports the signing key used by the maven-gpg-plugin.
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Run tests
        run: mvn -B verify

      - name: Publish to Maven Central
        run: mvn -B -Prelease deploy -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
