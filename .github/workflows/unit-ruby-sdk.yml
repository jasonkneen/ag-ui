name: unit

on:
  push:
    branches: [main]
    paths:
      - "sdks/community/ruby/**"
      - ".github/workflows/unit-ruby-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/community/ruby/**"
      - ".github/workflows/unit-ruby-sdk.yml"

permissions:
  contents: read

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: false
    - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626  # v1.320.0
      with:
        ruby-version: '3.4'
        # Built-in cache is fork-safe (fork PRs can't write to base repo cache)
        bundler-cache: true
        working-directory: sdks/community/ruby
    - run: bundle exec rake
      working-directory: sdks/community/ruby
