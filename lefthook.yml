output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  parallel: true
  commands:
    sync-lockfile:
      tags: lockfile
      glob: "**/package.json"
      run: pnpm i --lockfile-only
      stage_fixed: true
    generate-dojo-content:
      tags: dojo
      glob: "apps/dojo/**"
      run: pnpm --filter dojo run generate-content-json
      stage_fixed: true
    lint-fix:
      tags: lint
      run: pnpm run lint --fix && pnpm run format
      stage_fixed: true
    test-and-check-packages:
      tags: test-packages
      env:
        NX_TUI: "false"
      run: pnpm run test && pnpm run test:exports
